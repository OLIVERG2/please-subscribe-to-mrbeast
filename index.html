<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral Triangle | Discovery</title>
    <style>
        :root {
            --accent: #00d4ff;
            --bg-deep: #03070b;
            --glass: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* STICKY MAIN TITLE */
        .main-fixed-header {
            position: fixed;
            top: 50px;
            left: 60px;
            z-index: 100;
            pointer-events: none;
        }

        .main-fixed-header h1 {
            font-size: 1.2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 200;
            margin: 0;
            color: var(--accent);
        }

        /* Progress Bar */
        #progress-container {
            position: fixed;
            top: 0; width: 100%; height: 3px;
            z-index: 101;
            background: rgba(255,255,255,0.05);
        }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; }

        /* --- THE PERMANENT STICKY VIDEO --- */
        #my-video-container {
            position: fixed;
            top: 40px;
            left: 360px; /* Positioned to the right of "CORAL TRIANGLE" */
            width: 220px;
            aspect-ratio: 16 / 9;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid var(--accent);
            border-radius: 4px;
            background: #000;
            overflow: hidden;
            transition: opacity 0.3s ease;
        }

        #my-video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #close-sticky {
            position: fixed;
            top: 35px;
            left: 565px; 
            z-index: 2001;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Section Layout Styles (Same as yours) */
        section { position: relative; height: 150vh; margin-top: -50vh; }
        .sticky-box { position: sticky; top: 0; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.4); z-index: -1; }
        .content-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 50px; max-width: 1200px; width: 85%; padding: 60px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        section:hover .content-grid { opacity: 1; transform: translateY(0); }
        .sidebar h2 { font-size: 2.5rem; letter-spacing: 6px; text-transform: uppercase; margin: 0; }
        .sidebar .subtitle { font-size: 0.8rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-top: 10px; display: block; }
        .text-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 30px; }
        .editable-block { font-size: 0.95rem; line-height: 1.8; color: #cecece; }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="main-fixed-header">
        <h1>CORAL TRIANGLE</h1>
    </div>

    <div id="video-root">
        <div id="my-video-container">
            <iframe 
                src="https://www.youtube.com/embed/M6AM2PozsbQ?autoplay=1&mute=1&loop=1&playlist=M6AM2PozsbQ" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
        <button id="close-sticky" onclick="dismissSticky()">×</button>
    </div>

    <section>
        <div class="sticky-box">
            <div class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1582967788606-a171c1080cb0?q=80&w=2000');"></div>
            <div class="content-grid">
                <div class="sidebar">
                    <h4>The Coral Triangle.</h4>
                    <span class="subtitle">A Journey of Discovery</span>
                </div>
                <div class="text-columns">
                    <div class="editable-block">By: Kyle Fergason</div>
                    <div class="editable-block">And Oliver Garcia</div>
                </div>
            </div>
        </div>
    </section>

    <section>
        <div class="sticky-box">
            <div class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1522069169874-c58ec4b76be5?q=80&w=2000');"></div>
            <div class="content-grid">
                <div class="sidebar">
                    <h2>Impact</h2>
                    <span class="subtitle">Why it matters.</span>
                </div>
                <div class="text-columns">
                    <div class="editable-block">The coral triangle is a breeding ground for fish where most of the world's species go to reproduce.</div>
                    <div class="editable-block">It houses 76% of the worlds coral species.</div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Progress Bar logic
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        // Function to close the video if the user wants it gone
        function dismissSticky() {
            document.getElementById('video-root').style.display = 'none';
        }
    </script>
</body>
</html>
